route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'zen70_admin'

receivers:
  - name: 'zen70_admin'
    webhook_configs:
      - url: 'http://gateway:8000/api/v1/webhook/alerts' # ZEN70 webhook handler
        send_resolved: true
