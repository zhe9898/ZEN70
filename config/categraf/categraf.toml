# ZEN70 Categraf SRE 边缘探针配置
# 法典 4.0 契约：极低开销指标抓取
# @generated by ZEN70-AI-Agent

[global]
# 全局标签，标记节点身份
labels = { "arch"="zen70", "node"="edge-1" }
# 全局探测周期
interval = 15

# 时序存储推送后端 (VictoriaMetrics)
[[writers]]
url = "http://victoriametrics:8428/api/v1/write"
timeout = 5000
dial_timeout = 2500

[log]
file_name = "stdout"
level = "warn"

# =========================================================
# System OS Core Metrics 
# =========================================================

# CPU 占用
[[inputs.cpu]]
interval = 15
percpu = false
totalcpu = true

# 内存耗尽预警 (法典 3.1)
[[inputs.mem]]
interval = 15

# 磁盘 95% 熔断探测基线 (法典 3.3)
[[inputs.disk]]
interval = 30
mount_points = ["/", "/mnt/media", "/mnt/models"]
ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]

# =========================================================
# Docker 容器存活检测 (法典 3.2.1 依赖)
# =========================================================
[[inputs.docker]]
interval = 15
endpoint = "unix:///var/run/docker.sock"
gather_services = false

# =========================================================
# ZEN70 API 性能中间件探针 (法典 4.0: P99 延迟及并发锁)
# =========================================================
[[inputs.prometheus]]
interval = 15
urls = ["http://gateway:8000/metrics"]
timeout = 5
ignore_metrics_errors = true
# Categraf 可见范围控制，防止 metrics 过热
name_prefix = ""
