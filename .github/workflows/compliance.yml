# 法典 5.2.1 / 5.2.2：CI 门禁 — 依赖与代码规范、单元测试
# 合并前需通过：backend 单元测试 + black/isort/flake8（与 .pre-commit-config.yaml 一致）
name: Compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Black
        run: black --check --line-length 160 backend/
      - name: isort
        run: isort --check-only --profile black --line-length 160 backend/
      - name: Flake8
        run: flake8 --max-line-length=160 --extend-ignore=E203,W503 backend/

      - name: Unit tests
        run: python -m pytest backend/tests/unit/ -v --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}
