name: Build V2.9.1 Offline Bundle

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build_offline_v2_9.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_offline:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local ZEN70-Gateway Image
        run: |
          docker build -f backend/Dockerfile -t zen70-gateway:latest .

      - name: Pull Required Public Docker Images
        run: |
          pull_with_retry() {
            local img=$1
            for i in {1..5}; do
              if docker pull "$img"; then
                echo "Successfully pulled $img"
                return 0
              fi
              echo "Rate limit hit or failure. Retrying $img in 20s... ($i/5)"
              sleep 20
            done
            echo "FATAL: Could not pull $img"
            exit 1
          }
          pull_with_retry caddy:2-alpine
          pull_with_retry postgres:15-alpine
          pull_with_retry edoburu/pgbouncer:1.22.1-p0
          pull_with_retry redis:7-alpine
          pull_with_retry cloudflare/cloudflared:latest
          pull_with_retry victoriametrics/victoria-metrics:latest
          pull_with_retry grafana/grafana:latest
          pull_with_retry tecnativa/docker-socket-proxy:latest
          pull_with_retry flashcatcloud/categraf:latest
          pull_with_retry grafana/loki:latest
          pull_with_retry grafana/promtail:latest
          pull_with_retry prom/alertmanager:latest
          pull_with_retry victoriametrics/vmalert:latest
          pull_with_retry eclipse-mosquitto:2
          pull_with_retry python:3.12-slim
          pull_with_retry jellyfin/jellyfin:latest
          
      - name: Save images to tar archive
        run: |
          mkdir -p offline_bundle/ZEN70_V2.9.1
          docker save -o offline_bundle/ZEN70_V2.9.1/zen70_offline_images_v2.9.1.tar \
            zen70-gateway:latest \
            caddy:2-alpine postgres:15-alpine edoburu/pgbouncer:1.22.1-p0 redis:7-alpine \
            cloudflare/cloudflared:latest victoriametrics/victoria-metrics:latest \
            grafana/grafana:latest tecnativa/docker-socket-proxy:latest flashcatcloud/categraf:latest \
            grafana/loki:latest grafana/promtail:latest prom/alertmanager:latest \
            victoriametrics/vmalert:latest eclipse-mosquitto:2 python:3.12-slim jellyfin/jellyfin:latest

      - name: Package Repository
        run: |
          rsync -a --exclude='.git/' --exclude='offline_bundle/' ./ offline_bundle/ZEN70_V2.9.1/
          cd offline_bundle
          zip -r zen70_v2.9.1_offline_bundle.zip ZEN70_V2.9.1/
          
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying archive size before upload:"
          ls -lh offline_bundle/zen70_v2.9.1_offline_bundle.zip || exit 1
          
          echo "Ensuring release v2.9.1 exists..."
          gh release create v2.9.1 --title "ZEN70 V2.9.1 (Offline Docker Bundle)" --notes "Automated True-Offline Container Release" || echo "Release already exists or creation skipped (422), continuing to upload..."
          
          echo "Uploading asset and overwriting if exists..."
          for i in {1..3}; do
            if gh release upload v2.9.1 offline_bundle/zen70_v2.9.1_offline_bundle.zip --clobber; then
              echo "Upload successful!"
              exit 0
            fi
            echo "Upload failed or timed out. Retrying in 15 seconds... ($i/3)"
            sleep 15
          done
          echo "FATAL: Failed to upload release asset after 3 attempts."
          exit 1
